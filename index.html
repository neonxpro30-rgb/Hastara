<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hastara — Handcrafted Earrings | Shop Premium Indian Jewelry Online</title>
    <meta name="description" content="Discover Hastara's collection of handcrafted oxidized silver earrings — Chandbali, Jhumka, Danglers, Studs & more. Premium quality, affordable prices. Free shipping above ₹499." />
    <meta name="keywords" content="earrings, handcrafted jewelry, oxidized silver, jhumka, chandbali, Indian jewelry, Hastara" />
    <meta name="author" content="Hastara" />
    <meta name="theme-color" content="#0d0b0e" />
    <meta property="og:title" content="Hastara — Handcrafted Earrings" />
    <meta property="og:description" content="Shop premium handcrafted earrings. Chandbali, Jhumka, Danglers & more." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/images/hero-banner.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="error-overlay" style="display:none; position:fixed; z-index:9999; top:0; left:0; width:100%; height:100%; background:rgba(255,0,0,0.9); color:white; padding:2rem; font-family:monospace; font-size:16px; overflow:auto;">
      <h1>Runtime Error Caught!</h1>
      <pre id="error-msg"></pre>
    </div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-msg').textContent += msg + '\n' + (error && error.stack ? error.stack : '') + '\n\n';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-msg').textContent += 'Unhandled Rejection: ' + event.reason + '\n\n';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
